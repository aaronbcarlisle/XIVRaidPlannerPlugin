name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow the auto-release workflow to invoke the same build/release pipeline
  # for an already-pushed tag.
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v0.4.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    env:
      DALAMUD_HOME: /tmp/dalamud

    steps:
      - name: Resolve tag
        run: |
          # When called via workflow_call the tag comes from inputs; on a tag
          # push it comes from the ref. VERSION is the tag without the leading v.
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.ref_name }}"; fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Download Dalamud
        run: |
          mkdir -p $DALAMUD_HOME
          curl -sSL https://goatcorp.github.io/dalamud-distrib/latest.zip -o /tmp/dalamud.zip
          unzip -o /tmp/dalamud.zip -d $DALAMUD_HOME

      - name: Build (Release)
        run: dotnet build --configuration Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: XIVRaidPlannerPlugin/bin/Release/XIVRaidPlannerPlugin/latest.zip
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Update repo.json
        run: |
          TIMESTAMP=$(date +%s)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/latest.zip"
          BUILT_MANIFEST="XIVRaidPlannerPlugin/bin/Release/XIVRaidPlannerPlugin/XIVRaidPlannerPlugin.json"
          SOURCE_MANIFEST="XIVRaidPlannerPlugin/XIVRaidPlannerPlugin.json"

          python3 -c "
          import json
          with open('repo.json', 'r') as f:
              repo = json.load(f)
          with open('${BUILT_MANIFEST}', 'r') as f:
              built = json.load(f)
          with open('${SOURCE_MANIFEST}', 'r') as f:
              source = json.load(f)
          repo[0]['AssemblyVersion'] = '${VERSION}.0'
          repo[0]['LastUpdate'] = int(${TIMESTAMP})
          repo[0]['DownloadLinkInstall'] = '${DOWNLOAD_URL}'
          repo[0]['DownloadLinkUpdate'] = '${DOWNLOAD_URL}'
          repo[0]['DownloadLinkTesting'] = '${DOWNLOAD_URL}'
          # Track the API level the build actually targets.
          repo[0]['DalamudApiLevel'] = built['DalamudApiLevel']
          # Surface the changelog from the source manifest in the installer list.
          if 'Changelog' in source:
              repo[0]['Changelog'] = source['Changelog']
          with open('repo.json', 'w') as f:
              json.dump(repo, f, indent=2)
              f.write('\n')
          "

      - name: Commit repo.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          # Re-run the update on main's repo.json so we don't overwrite later
          # post-tag manual edits (e.g. fixing the API level for an old tag).
          TIMESTAMP=$(date +%s)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/latest.zip"
          BUILT_MANIFEST="XIVRaidPlannerPlugin/bin/Release/XIVRaidPlannerPlugin/XIVRaidPlannerPlugin.json"
          SOURCE_MANIFEST="XIVRaidPlannerPlugin/XIVRaidPlannerPlugin.json"
          python3 -c "
          import json
          with open('repo.json', 'r') as f:
              repo = json.load(f)
          with open('${BUILT_MANIFEST}', 'r') as f:
              built = json.load(f)
          with open('${SOURCE_MANIFEST}', 'r') as f:
              source = json.load(f)
          repo[0]['AssemblyVersion'] = '${VERSION}.0'
          repo[0]['LastUpdate'] = int(${TIMESTAMP})
          repo[0]['DownloadLinkInstall'] = '${DOWNLOAD_URL}'
          repo[0]['DownloadLinkUpdate'] = '${DOWNLOAD_URL}'
          repo[0]['DownloadLinkTesting'] = '${DOWNLOAD_URL}'
          repo[0]['DalamudApiLevel'] = built['DalamudApiLevel']
          if 'Changelog' in source:
              repo[0]['Changelog'] = source['Changelog']
          with open('repo.json', 'w') as f:
              json.dump(repo, f, indent=2)
              f.write('\n')
          "
          git add repo.json
          # Verify the catalog entry actually advertises this release before we
          # trust an empty diff as "already current" — guards against a silent
          # no-op (e.g. a manifest-shape change) leaving repo.json stale.
          ACTUAL=$(python3 -c "import json; print(json.load(open('repo.json'))[0]['AssemblyVersion'])")
          if [ "$ACTUAL" != "${VERSION}.0" ]; then
            echo "::error::repo.json AssemblyVersion is $ACTUAL, expected ${VERSION}.0"
            exit 1
          fi
          # No-op safely if repo.json is already current for this tag.
          if git diff --cached --quiet; then
            echo "repo.json already up to date for ${TAG}; nothing to commit."
          else
            git commit -m "release: update repo.json for ${TAG}"
            git push origin main
          fi
