name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Dalamud
        run: |
          mkdir -p ~/.xlcore/dalamud/Hooks/dev
          curl -sSL https://kamori.goats.dev/Dalamud/Release/Runtime -o /tmp/dalamud-runtime.zip
          # Dalamud SDK resolves dependencies at build time; the SDK package handles this
          # For CI, we just need .NET 8 and the SDK will download what it needs

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XIVRaidPlannerPlugin
          path: |
            XIVRaidPlannerPlugin/bin/Release/XIVRaidPlannerPlugin.dll
          if-no-files-found: warn
