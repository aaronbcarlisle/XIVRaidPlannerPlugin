name: PR Automation

on:
  pull_request:
    types: [opened, edited]

jobs:
  auto-assign-and-label:
    name: Auto-assign and Label PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-assign PR creator
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                assignees: [context.payload.pull_request.user.login]
              });
            } catch (error) {
              console.error(`Failed to auto-assign: ${error.message}`);
            }

      - name: Request Copilot code review
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['copilot']
              });
            } catch (error) {
              console.log(`Copilot review request skipped: ${error.message}`);
            }

      - name: Generate labels from PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = new Set();
            const prefixLabels = {
              'fix:': 'bug', 'feat:': 'enhancement', 'docs:': 'documentation',
              'chore:': 'chore', 'refactor:': 'refactor', 'test:': 'testing',
              'perf:': 'performance', 'ci:': 'ci/cd'
            };
            for (const [prefix, label] of Object.entries(prefixLabels)) {
              if (title.startsWith(prefix)) { labels.add(label); break; }
            }
            if (labels.size > 0) {
              const colors = {
                'bug': 'd73a4a', 'enhancement': 'a2eeef', 'documentation': '0075ca',
                'chore': 'fef2c0', 'refactor': 'c5def5', 'testing': '5319e7',
                'performance': '7057ff', 'ci/cd': 'e99695'
              };
              for (const label of labels) {
                try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label }); }
                catch (e) {
                  if (e.status === 404) {
                    await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color: colors[label] || 'ededed' });
                  }
                }
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, labels: Array.from(labels)
              });
            }
